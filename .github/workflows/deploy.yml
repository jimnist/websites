name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy-jimnist-com:
    runs-on: ubuntu-latest
    name: Deploy jimnist.com
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build
        run: cd apps/jimnist-com && bun run build
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/jimnist-com/dist --project-name=jimnist-com

  deploy-loco8:
    runs-on: ubuntu-latest
    name: Deploy loco8.org
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
